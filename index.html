<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>端午自驾游路线图</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: linear-gradient(135deg, #f5f7fa 0%, #e4eaf0 100%);
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }
    .header { text-align: center; margin-bottom: 40px; }
    .header h1 { font-size: 2rem; color: #2c3e50; margin-bottom: 8px; }
    .header p { color: #7f8c8d; font-size: 1rem; }
    .cards {
      display: flex; gap: 24px; flex-wrap: wrap;
      justify-content: center; max-width: 720px; width: 100%;
    }
    .card {
      background: white; border-radius: 16px; padding: 32px 28px;
      flex: 1; min-width: 280px; box-shadow: 0 4px 20px rgba(0,0,0,0.08);
      text-decoration: none; transition: transform 0.2s, box-shadow 0.2s;
      display: flex; flex-direction: column; align-items: center; text-align: center;
    }
    .card:hover { transform: translateY(-4px); box-shadow: 0 8px 30px rgba(0,0,0,0.15); }
    .card .emoji { font-size: 3.5rem; margin-bottom: 16px; }
    .card h2 { font-size: 1.2rem; color: #2c3e50; margin-bottom: 8px; }
    .card p { font-size: 0.9rem; color: #95a5a6; }
    .card.nature { border-top: 4px solid #27ae60; }
    .card.city   { border-top: 4px solid #e74c3c; }
    .footer { margin-top: 40px; color: #bdc3c7; font-size: 0.85rem; }
    @media (max-width: 600px) { .cards { flex-direction: column; } .header h1 { font-size: 1.5rem; } }
  </style>
</head>
<body>
  <div class="header">
    <h1>🎋 端午自驾游路线图</h1>
    <p>苏州 → 琅琊山 → 南山竹海 / 扬州 → 苏州</p>
  </div>
  <div class="cards">
    <a class="card nature" href="map-nature.html">
      <div class="emoji">🌿</div>
      <h2>自然之旅版</h2>
      <p>琅琊山 · 南山竹海 · 天目湖</p>
    </a>
    <a class="card city" href="map-city.html">
      <div class="emoji">🏛️</div>
      <h2>历史文化版</h2>
      <p>琅琊山 · 扬州瘦西湖</p>
    </a>
  </div>
  <div class="footer">🚗 祝旅途愉快 · 2026端午</div>
</body>
</html>
